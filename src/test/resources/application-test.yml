spring:
  docker:
    compose:
      enabled: true
      file: compose.yml
      lifecycle-management: start-and-stop
      start:
        command: up
      stop:
        command: down
        timeout: 1m
        arguments: -v
      skip:
        in-tests: false

  datasource:
    url: jdbc:postgresql://localhost:5433/pearl
    username: mypostgresuser
    password: mypostgrespassword
    driver-class-name: org.postgresql.Driver

  sql:
    init:
      mode: always
      data-locations: classpath:sql/pilotage/reinit-data.sql

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect


fr:
  insee:
    pearljam:
      persistence:
        database:
          host: localhost
          port: 5433
          schema: pearl
          user: mypostgresuser
          password: mypostgrespassword
          driver: org.postgresql.Driver
        datacollection:
          url: jdbc:postgresql://localhost:5434/questionnaire
          user: mypostgresuser2
          password: mypostgrespassword2
          driver: org.postgresql.Driver
      folder:
        in: src/test/resources/in
        out: src/test/resources/out
      ldap:
        service:
          url: https://api.fr:443
          realm: plop
      context:
        referential:
          service:
            url: http://test
        synchronization:
          # Log created and updated elements in the result file? ( YES | NO | IN_SEPARATE_FILE )
          log:
            elements: YES
          interviewers:
            reaffectation:
              threshold:
                #Maximum number of SU reaffected to an other interviewer during synchronization
                absolute: 100000
                #Maximum percentage SU reaffected to an other interviewer / SU processed during synchronization
                relative: 110
          organization:
            reaffectation:
              threshold:
                #Maximum number of SU reaffected to an other OU during synchronization
                absolute: 100000
                #Maximum percentage SU reaffected to an other OU / SU processed during synchronization
                relative: 110

