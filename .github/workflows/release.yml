name: Release 

on:
  push:
    branches:
      - 'main'
    tags:
      - '*'

jobs:
    build-release:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - name: Set up JDK 21
          uses: actions/setup-java@v4
          with:
            java-version: 21
            distribution: 'temurin'
        - name: Build with Maven
          timeout-minutes: 15
          run: mvn clean install --batch-mode --no-transfer-progress
        - name: Get current version
          id: version
          run: echo "::set-output name=prop::$(mvn -f pom.xml help:evaluate -Dexpression=project.version -q -DforceStdout)"
        - run: echo ${{steps.version.outputs.prop}}
        - name: Create Release
          id: create_release
          uses: actions/create-release@latest
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          with:
            tag_name: ${{steps.version.outputs.prop}}
            release_name: Release ${{steps.version.outputs.prop}}
            draft: false
            prerelease: false     